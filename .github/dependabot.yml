version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    commit-message:
      prefix: "chore(deps)"
    labels: [dependencies, github-actions]
    open-pull-requests-limit: 10

  - package-ecosystem: terraform
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    commit-message:
      prefix: "chore(deps)"
    labels: [dependencies, terraform]
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /scripts
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    commit-message:
      prefix: "chore(deps)"
    labels: [dependencies, python]
    open-pull-requests-limit: 5
