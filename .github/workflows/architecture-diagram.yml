# Auto-render the WAFv2 architecture diagram from examples/complete
# plan and commit it back when it drifts. Skips Dependabot PRs.

name: architecture-diagram

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  render:
    name: render
    runs-on: ubuntu-22.04
    if: ${{ github.actor != 'dependabot[bot]' && !contains(github.event.head_commit.message, '[skip-arch-diagram]') }}

    steps:
      - name: Checkout (PR branch when applicable)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install graphviz
        run: |
          sudo apt-get update -y
          sudo apt-get install -y graphviz

      - name: Install Python deps
        run: pip install --no-cache-dir -r scripts/requirements.txt

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.9.5"
          terraform_wrapper: false

      - name: terraform init + plan + show -json
        working-directory: examples/complete
        run: |
          set -euo pipefail
          terraform init -backend=false -input=false -no-color
          terraform plan -refresh=false -lock=false -input=false -no-color -out=plan.binary
          terraform show -json plan.binary > plan.json

      - name: Render architecture diagram
        run: |
          set -euo pipefail
          mkdir -p docs
          python scripts/render-architecture.py examples/complete/plan.json docs/architecture
          ls -la docs/architecture.png

      - name: Inject diagram link into README between markers
        env:
          README_PATH: README.md
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, re, pathlib
          readme = pathlib.Path(os.environ["README_PATH"])
          text = readme.read_text()
          begin = "<!-- BEGIN_ARCH -->"
          end   = "<!-- END_ARCH -->"
          inject = (
              f"{begin}\n"
              f"\n"
              f"![Architecture (auto-generated from examples/complete)](docs/architecture.png)\n"
              f"\n"
              f"<sub>Generated by `.github/workflows/architecture-diagram.yml` on every push to main. Do not edit the image by hand — change the Terraform code in `examples/complete/` and the bot will regenerate it.</sub>\n"
              f"\n"
              f"{end}"
          )
          if begin in text and end in text:
              new = re.sub(re.escape(begin) + r".*?" + re.escape(end), inject, text, count=1, flags=re.DOTALL)
              if new != text:
                  readme.write_text(new); print("README marker block refreshed.")
              else:
                  print("README marker block already current.")
          else:
              print("README has no BEGIN_ARCH / END_ARCH markers — skipping injection.")
          PY

      - name: Clean transient terraform artifacts
        working-directory: examples/complete
        run: |
          rm -f plan.binary plan.json
          rm -rf .terraform .terraform.lock.hcl

      - name: Commit regenerated diagram (if changed)
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name  "devotica-bot"
          git config user.email "bot@devotica.com"
          git add docs/architecture.png README.md
          if git diff --cached --quiet; then
            echo "::notice::No diagram changes to commit."
            exit 0
          fi
          git commit -m "chore(docs): regenerate architecture diagram [skip-arch-diagram]"
          git push origin "HEAD:${HEAD_REF}"
